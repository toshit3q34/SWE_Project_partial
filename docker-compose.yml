services:
  mysql:
    image: mysql:8.0
    container_name: hmis-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: hmis
      MYSQL_USER: hmis
      MYSQL_PASSWORD: hmis_secret
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - hmis_mysql_data:/var/lib/mysql
      # Schema and seed run automatically on FIRST run only.
      # If you change them later, run `docker compose down -v` to reset the volume,
      # or apply changes manually with: mysql -h 127.0.0.1 -P 3306 -u hmis -p hmis < database/schema.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "hmis", "-phmis_secret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  hmis_mysql_data:
